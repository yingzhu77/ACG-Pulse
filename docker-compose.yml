services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: game-pulse
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/server/data/prod.db
      - PORT=3001
      - CLIENT_URL=${CLIENT_URL:-https://acg.yingzhu.xyz}
      - TRUST_PROXY_HOPS=1
      - RSSHUB_BASE_URLS=http://rsshub:1200,https://rsshub.app
      - RSS_FETCH_TIMEOUT_MS=30000
      - SOURCE_CHECK_TIMEOUT_MS=35000
      - SOURCE_CHECK_CONCURRENCY=5
      - BILIBILI_DIRECT_API_FALLBACK=true
      - BILIBILI_DIRECT_API_TIMEOUT_MS=30000
      - BILIBILI_REQUEST_INTERVAL_MS=6000
      - BILIBILI_COOKIE=${BILIBILI_COOKIE}
      # AI Provider - fill in your keys
      - AI_PROVIDER=${AI_PROVIDER:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MIMO_API_KEY=${MIMO_API_KEY:-}
      # Admin - MUST be set before deployment
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?请设置 ADMIN_PASSWORD 环境变量}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:?请设置 ADMIN_JWT_SECRET 环境变量（至少32字符）}
    volumes:
      - app-data:/app/server/data
    depends_on:
      rsshub:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  rsshub:
    build:
      context: ./rsshub
      dockerfile: Dockerfile
    container_name: game-pulse-rsshub
    restart: unless-stopped
    expose:
      - "1200"
    environment:
      - NODE_ENV=production
      - CACHE_EXPIRE=600
      - REQUEST_TIMEOUT=15000
      - REQUEST_RETRY=2
      # RSSHub B站路由需要 per-uid cookie 格式
      - BILIBILI_COOKIE_401742377=${BILIBILI_COOKIE}
      - BILIBILI_COOKIE_1340190821=${BILIBILI_COOKIE}
      - BILIBILI_COOKIE_27534330=${BILIBILI_COOKIE}
      - BILIBILI_COOKIE_1636034895=${BILIBILI_COOKIE}
      - BILIBILI_COOKIE_1955897084=${BILIBILI_COOKIE}
      - BILIBILI_COOKIE_161775300=${BILIBILI_COOKIE}
      - BILIBILI_COOKIE_1265652806=${BILIBILI_COOKIE}
      - BILIBILI_COOKIE_3546636978489848=${BILIBILI_COOKIE}
      - BILIBILI_COOKIE_652239032=${BILIBILI_COOKIE}
      - BILIBILI_COOKIE_8465957=${BILIBILI_COOKIE}
    volumes:
      - rsshub-cache:/app/cache
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:1200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  app-data:
    driver: local
  rsshub-cache:
    driver: local
